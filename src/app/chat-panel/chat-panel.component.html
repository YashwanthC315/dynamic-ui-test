<aside class="chat-panel">
  <header class="chat-header">
    <h1>{{ title }}</h1>
    <p>{{ subtitle }}</p>
  </header>

  <section class="chat-thread" #chatThread>
    <article class="chat-message" *ngFor="let message of messages" [class.user]="message.role === 'user'">
      <p>{{ message.text }}</p>
      <div class="message-options" *ngIf="message.role === 'assistant' && message.options?.length">
        <button type="button" class="message-option-btn" *ngFor="let option of message.options" (click)="runMessageOption(option)">
          {{ option.label }}
        </button>
      </div>
      <small>{{ message.role | titlecase }} - {{ message.time }}</small>
    </article>
  </section>

  <div class="chat-input-row">
    <input type="text" [(ngModel)]="chatInput" [placeholder]="placeholder" (keyup.enter)="submitPrompt()" />
    <button type="button" class="primary" (click)="submitPrompt()">Send</button>
  </div>
</aside>
