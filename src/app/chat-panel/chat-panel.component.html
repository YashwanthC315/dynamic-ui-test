<aside class="chat-panel">
  <header class="chat-header">
    <h1>{{ title }}</h1>
    <p>{{ subtitle }}</p>
  </header>

  <section class="quick-command-list" *ngIf="quickCommands.length > 0">
    <button type="button" class="quick-btn" *ngFor="let command of quickCommands" (click)="runQuickCommand(command)">
      {{ command }}
    </button>
  </section>

  <section class="chat-thread">
    <article class="chat-message" *ngFor="let message of messages" [class.user]="message.role === 'user'">
      <p>{{ message.text }}</p>
      <small>{{ message.role | titlecase }} - {{ message.time }}</small>
    </article>
  </section>

  <div class="chat-input-row">
    <input type="text" [(ngModel)]="chatInput" [placeholder]="placeholder" (keyup.enter)="submitPrompt()" />
    <button type="button" class="primary" (click)="submitPrompt()">Send</button>
  </div>
</aside>
