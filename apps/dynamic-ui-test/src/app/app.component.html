<main class="app-shell">
  <header class="topbar">
    <h1>{{ title }}</h1>
    <div class="topbar-actions">
      <button type="button" class="ai-agent-btn" (click)="toggleAiAgent()">AI Agent</button>
      <nav>
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Fee Operations</a>
        <a routerLink="/marks" routerLinkActive="active">Marks</a>
      </nav>
    </div>
  </header>

  <router-outlet></router-outlet>
  <app-ai-agent-overlay></app-ai-agent-overlay>
</main>
